name: Publish CLI

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    name: publish
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build publishable CLI package
        run: npm run build

      - name: Validate CLI package
        run: npm run pack:cli

      - name: Publish @turnkeyai/cli to npm
        run: npm publish --workspace @turnkeyai/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
