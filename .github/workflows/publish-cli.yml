name: Publish CLI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    name: publish
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build publishable CLI package
        run: npm run build

      - name: Run release readiness verification
        run: npm run release:verify -- --skip-build --artifact-dir .artifacts --json .artifacts/release-readiness.json

      - name: Publish @turnkeyai/cli to npm
        run: npm publish --workspace @turnkeyai/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload tarball to GitHub release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" .artifacts/*.tgz .artifacts/release-readiness.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
