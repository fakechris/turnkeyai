name: Publish CLI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    name: publish
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build publishable CLI package
        run: npm run build

      - name: Run release readiness verification
        if: ${{ always() }}
        run: npm run release:verify -- --skip-build --artifact-dir .artifacts --json .artifacts/release-readiness.json

      - name: Run Phase 1 baseline gate
        run: |
          mkdir -p .artifacts
          npm run phase1:baseline -- \
            --runs 1 \
            --transport-cycles 3 \
            --soak-cycles 3 \
            --release-skip-build \
            --data-dir .artifacts/phase1-baseline-data \
            --json .artifacts/phase1-baseline.json

      - name: Publish @turnkeyai/cli to npm
        run: npm publish --workspace @turnkeyai/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload publish diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: turnkeyai-cli-publish-diagnostics
          if-no-files-found: warn
          path: |
            .artifacts/*.tgz
            .artifacts/release-readiness.json
            .artifacts/phase1-baseline.json
            .artifacts/phase1-baseline-data/validation-artifacts/**

      - name: Upload tarball to GitHub release
        if: ${{ always() && github.event_name == 'release' }}
        run: |
          shopt -s nullglob
          files=(.artifacts/*.tgz)
          if [ -f .artifacts/release-readiness.json ]; then
            files+=(.artifacts/release-readiness.json)
          fi
          if [ -f .artifacts/phase1-baseline.json ]; then
            files+=(.artifacts/phase1-baseline.json)
          fi
          if ((${#files[@]})); then
            gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
